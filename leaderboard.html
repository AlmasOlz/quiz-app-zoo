<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лидерборд</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family:'Poppins',sans-serif;
            min-height:100vh;
            background: var(--quiz-gradient);
            padding: 24px 16px 48px;
        }
        .lb-card {
            max-width: 680px;
            margin: 0 auto;
            border-radius: 22px !important;
            overflow: hidden;
            box-shadow: 0 28px 72px rgba(0,0,0,.22) !important;
        }
        /* Header */
        .lb-header {
            background: linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
            padding: 32px 28px 28px;
            position: relative;
            overflow: hidden;
        }
        .lb-header::before {
            content:''; position:absolute; top:-40%; right:-15%;
            width:300px; height:300px;
            background:rgba(102,126,234,.15); border-radius:50%;
        }
        .lb-header .content { position:relative; z-index:1; }
        .lb-header .trophy-bg {
            width: 72px; height: 72px;
            background: linear-gradient(135deg,#fdcb6e,#e17055);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 34px;
            margin: 0 auto 14px;
            box-shadow: 0 8px 24px rgba(253,203,110,.35);
        }
        .lb-header h4 { color: white; font-weight: 800; margin-bottom: 4px; }
        .lb-header .quiz-sub {
            color: rgba(255,255,255,.55);
            font-size: 13px;
            background: rgba(255,255,255,.07);
            display: inline-block;
            padding: 4px 14px; border-radius: 20px;
        }
        /* Podium */
        .podium-section {
            background: #f8fafc;
            padding: 28px 24px 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        .podium-wrap { display:flex; justify-content:center; align-items:flex-end; gap:12px; }
        .podium-col  { display:flex; flex-direction:column; align-items:center; gap:4px; }
        .podium-col .p-name { font-size:12px; font-weight:700; color:#1e293b; max-width:80px; text-align:center; word-break:break-word; line-height:1.2; }
        .podium-col .p-pct  { font-size:11px; color:#64748b; font-weight:600; }
        .podium-bar {
            width: 86px; border-radius: 12px 12px 0 0;
            display:flex; align-items:flex-start; justify-content:center;
            padding-top: 10px; font-size:22px;
            position:relative; overflow:hidden;
        }
        .podium-bar.p1 { background: linear-gradient(180deg,#ffd700,#f59e0b); box-shadow:0 4px 16px rgba(245,158,11,.4); }
        .podium-bar.p2 { background: linear-gradient(180deg,#d1d5db,#9ca3af); box-shadow:0 4px 12px rgba(156,163,175,.3); }
        .podium-bar.p3 { background: linear-gradient(180deg,#fb923c,#ea580c); box-shadow:0 4px 12px rgba(234,88,12,.3); }
        /* Table */
        .lb-table-wrap { background: white; }
        .lb-table-wrap .table { margin: 0; }
        .lb-table-wrap .table th { font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:#64748b; border-bottom:1px solid #e2e8f0; padding:14px 16px; font-weight:600; }
        .lb-table-wrap .table td { padding:13px 16px; border-bottom:1px solid #f1f5f9; }
        tr.rank-1 td { background: linear-gradient(90deg, #fffbea, white) !important; }
        tr.rank-2 td { background: linear-gradient(90deg, #f9fafb, white) !important; }
        tr.rank-3 td { background: linear-gradient(90deg, #fff7ed, white) !important; }
        tr.my-row td { background: rgba(102,126,234,.07) !important; font-weight:600; }
        /* Footer */
        .lb-footer { background: white; padding: 20px 24px; border-top:1px solid #f1f5f9; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</head>
<body>
<div id="toast-container"></div>

<div class="card border-0 lb-card animate-in">

    <!-- Header -->
    <div class="lb-header">
        <div class="content text-center">
            <div class="trophy-bg">🏆</div>
            <h4>Үздік нәтижелер</h4>
            <span class="quiz-sub" id="quiz-title-lb">Жүктелуде...</span>
        </div>
    </div>

    <!-- Podium (top 3) -->
    <div class="podium-section" id="podium-section" style="display:none">
        <div class="podium-wrap" id="podium-wrap"></div>
    </div>

    <!-- Table -->
    <div class="lb-table-wrap">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th style="width:44px">#</th>
                        <th>Атауы</th>
                        <th>Балл</th>
                        <th>%</th>
                        <th>Уақыт</th>
                    </tr>
                </thead>
                <tbody id="lb-body">
                    <tr><td colspan="5" class="text-center py-4 text-muted">
                        <span class="spinner-border spinner-border-sm me-2"></span>Жүктелуде...
                    </td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Footer -->
    <div class="lb-footer d-flex gap-2 justify-content-center">
        <button onclick="history.back()" class="btn btn-outline-secondary rounded-pill fw-semibold px-4">
            <i class="fas fa-arrow-left me-1"></i>Нәтижеге оралу
        </button>
        <a href="index.html" class="btn btn-primary rounded-pill fw-semibold px-4">
            <i class="fas fa-home me-1"></i>Мәзір
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const quizId = params.get('quiz');
    let myUid    = null;

    if (!quizId) { window.location.href = 'index.html'; }
    else { requireAuth(async (user) => { myUid = user.uid; await loadLeaderboard(); }); }

    async function loadLeaderboard() {
        try {
            const quizDoc = await db.collection('quizzes').doc(quizId).get();
            if (quizDoc.exists) {
                document.getElementById('quiz-title-lb').textContent = quizDoc.data().title;
                document.title = `Лидерборд — ${quizDoc.data().title}`;
            }

            const snap = await db.collection('leaderboard')
                .where('quizId', '==', quizId)
                .orderBy('percentage', 'desc')
                .orderBy('timeTaken', 'asc')
                .limit(20).get();

            if (snap.empty) {
                document.getElementById('lb-body').innerHTML =
                    '<tr><td colspan="5" class="text-center py-5 text-muted"><i class="fas fa-inbox fa-2x d-block mb-2 opacity-40"></i>Әлі ешкім тест тапсырмаған</td></tr>';
                return;
            }

            const entries = snap.docs.map(d => ({ ...d.data() }));
            if (entries.length >= 2) renderPodium(entries);

            document.getElementById('lb-body').innerHTML = entries.map((e, i) => {
                const isMe   = e.userId === myUid;
                const medal  = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}`;
                const pctCls = e.percentage >= 70 ? 'bg-success' : e.percentage >= 50 ? 'bg-warning text-dark' : 'bg-danger';
                const rowCls = isMe ? 'my-row' : i < 3 ? `rank-${i+1}` : '';
                return `<tr class="${rowCls}">
                    <td class="text-center fw-bold" style="font-size:${i<3?'18px':'14px'}">${medal}</td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div class="avatar-circle" style="width:32px;height:32px;font-size:12px">
                                ${(e.userName || '?').charAt(0).toUpperCase()}
                            </div>
                            <span class="fw-semibold">${e.userName || '—'}</span>
                            ${isMe ? '<span class="badge bg-primary ms-1" style="font-size:10px">Мен</span>' : ''}
                        </div>
                    </td>
                    <td class="fw-semibold">${e.score}/${e.total}</td>
                    <td><span class="badge ${pctCls}">${e.percentage}%</span></td>
                    <td class="text-muted small">${formatTime(e.timeTaken)}</td>
                </tr>`;
            }).join('');

        } catch (err) {
            console.error(err);
            if (err.code === 'failed-precondition') {
                document.getElementById('lb-body').innerHTML =
                    `<tr><td colspan="5" class="text-center py-3">
                        <div class="alert alert-warning mx-3 mb-0">
                            <i class="fas fa-info-circle me-2"></i>
                            Firestore индексін жасау керек.<br>
                            <small>Firebase Console → Firestore → Indexes → консоль қателігіндегі сілтемені басыңыз.</small>
                        </div>
                    </td></tr>`;
            } else {
                showToast('Жүктеу қатесі', 'error');
            }
        }
    }

    function renderPodium(entries) {
        const top3 = entries.slice(0, Math.min(3, entries.length));
        // Order: 2nd, 1st, 3rd for visual podium
        const order = top3.length === 1
            ? [top3[0]]
            : top3.length === 2
            ? [top3[1], top3[0]]
            : [top3[1], top3[0], top3[2]];

        const heights = top3.length === 1
            ? ['100px']
            : top3.length === 2
            ? ['80px', '110px']
            : ['80px', '110px', '60px'];

        const classes = top3.length === 1
            ? ['p1']
            : top3.length === 2
            ? ['p2', 'p1']
            : ['p2', 'p1', 'p3'];

        const medals  = top3.length === 1
            ? ['🥇']
            : top3.length === 2
            ? ['🥈', '🥇']
            : ['🥈', '🥇', '🥉'];

        document.getElementById('podium-section').style.display = '';
        document.getElementById('podium-wrap').innerHTML = order.map((e, i) => `
            <div class="podium-col">
                <div class="p-name">${(e.userName || '').split(' ')[0]}</div>
                <div class="p-pct">${e.percentage}%</div>
                <div class="podium-bar ${classes[i]}" style="height:${heights[i]}">
                    <span>${medals[i]}</span>
                </div>
            </div>`).join('');
    }
</script>
</body>
</html>
