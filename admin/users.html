<!-- Desktop sidebar -->

        <i class="fas fa-shield-alt"></i><span>Admin Panel</span>
    </div>
    <nav class="sidebar-nav flex-grow-1">
        <a href="index.html"   class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="quizzes.html" class="nav-link"><i class="fas fa-clipboard-list"></i> Тесттер</a>
        <a href="import.html"  class="nav-link"><i class="fas fa-file-import"></i> Импорт</a>
        <a href="users.html"   class="nav-link active"><i class="fas fa-users"></i> Юзерлер</a>
        <a href="groups.html"  class="nav-link"><i class="fas fa-layer-group"></i> Топтар</a>
        <a href="results.html" class="nav-link"><i class="fas fa-chart-bar"></i> Нәтижелер</a>
    </nav>
    <div class="sidebar-footer">
        <a href="../index.html" class="nav-link"><i class="fas fa-home"></i> Сайтқа қайту</a>

<!-- Main wrapper -->
<div class="admin-main-wrapper">

    <nav class="navbar bg-white shadow-sm px-3 px-lg-4 sticky-top" style="z-index:999">
        <button class="btn btn-link d-lg-none p-0 text-dark me-2" data-bs-toggle="offcanvas" data-bs-target="#adminSidebar">
            <i class="fas fa-bars fa-lg"></i>
        </button>
        <h6 class="mb-0 fw-bold">Пайдаланушылар</h6>
        <div class="ms-auto d-flex align-items-center gap-2">
            <div class="avatar-circle" id="admin-avatar">A</div>
            <span class="fw-semibold small d-none d-sm-inline" id="admin-name"></span>
        </div>
    </nav>

    <div class="p-3 p-lg-4">

        <!-- Search + badges -->
        <div class="d-flex gap-3 flex-wrap align-items-center mb-4">
            <div class="input-group flex-grow-1" style="max-width:400px">
                <span class="input-group-text bg-white border-end-0">
                    <i class="fas fa-search text-muted"></i>
                </span>
                <input type="text" id="search-input" class="form-control border-start-0 ps-0"
                    placeholder="Аты немесе email бойынша іздеу..."
                    oninput="filterUsers()">
            </div>
            <div class="d-flex gap-2">
                <span class="badge bg-primary rounded-pill fs-6 px-3" id="total-badge">—</span>
                <span class="badge bg-warning text-dark rounded-pill fs-6 px-3" id="admin-badge">—</span>
            </div>
        </div>

        <div class="card border-0 shadow-sm" style="border-radius:1rem">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Пайдаланушы</th>
                            <th>Email</th>
                            <th>Рөл</th>
                            <th>Тіркелді</th>
                            <th>Соңғы кіру</th>
                            <th>Әрекет</th>
                        </tr>
                    </thead>
                    <tbody id="users-body">
                        <tr><td colspan="6" class="text-center py-4 text-muted">
                            <span class="spinner-border spinner-border-sm me-2"></span>Жүктелуде...
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let allUsers = [];
    let myUid = null;

    requireAdmin(async (user, userData) => {
        myUid = user.uid;
        const name = userData.name || user.email;
        document.getElementById('admin-name').textContent = name;
        document.getElementById('admin-avatar').textContent = name.charAt(0).toUpperCase();
        await loadUsers();
    });

    async function loadUsers() {
        const snap = await db.collection('users').orderBy('createdAt', 'desc').get();
        allUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        updateBadges();
        renderUsers(allUsers);
    }

    function updateBadges() {
        document.getElementById('total-badge').textContent = `${allUsers.length} пайдаланушы`;
        document.getElementById('admin-badge').textContent = `${allUsers.filter(u => u.role === 'admin').length} admin`;
    }

    function filterUsers() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const filtered = q
            ? allUsers.filter(u =>
                (u.name || '').toLowerCase().includes(q) ||
                (u.email || '').toLowerCase().includes(q))
            : allUsers;
        renderUsers(filtered);
    }

    function renderUsers(users) {
        const tbody = document.getElementById('users-body');
        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">Пайдаланушы табылмады</td></tr>';
            return;
        }
        tbody.innerHTML = users.map(u => {
            const isMe    = u.id === myUid;
            const isAdmin = u.role === 'admin';
            const initial = (u.name || u.email || '?').charAt(0).toUpperCase();
            return `<tr>
                <td>
                    <div class="d-flex align-items-center gap-2">
                        <div class="avatar-circle flex-shrink-0" style="width:36px;height:36px;font-size:13px">${initial}</div>
                        <div>
                            <div class="fw-semibold">${u.name || '—'}
                                ${isMe ? '<span class="badge bg-primary ms-1" style="font-size:10px">Мен</span>' : ''}
                            </div>
                        </div>
                    </div>
                </td>
                <td class="text-muted small">${u.email || '—'}</td>
                <td>
                    <span class="badge ${isAdmin ? 'bg-warning text-dark' : 'bg-light text-secondary border'} rounded-pill">
                        <i class="fas fa-${isAdmin ? 'shield-alt' : 'user'} me-1"></i>${isAdmin ? 'Admin' : 'User'}
                    </span>
                </td>
                <td class="text-muted small">${formatDate(u.createdAt)}</td>
                <td class="text-muted small">${formatDate(u.lastLogin)}</td>
                <td>
                    ${!isMe ? `
                    <button class="btn btn-sm ${isAdmin ? 'btn-outline-secondary' : 'btn-outline-primary'} rounded-pill"
                        onclick="toggleRole('${u.id}', '${u.role}', '${(u.name || u.email || '').replace(/'/g, "\\'")}')">
                        <i class="fas fa-${isAdmin ? 'user' : 'shield-alt'} me-1"></i>
                        ${isAdmin ? 'User қылу' : 'Admin қылу'}
                    </button>` : '<span class="text-muted small">—</span>'}
                </td>
            </tr>`;
        }).join('');
    }

    async function toggleRole(uid, currentRole, name) {
        const newRole = currentRole === 'admin' ? 'user' : 'admin';
        const msg = newRole === 'admin'
            ? `"${name}" пайдаланушысына admin рөлін беру керек пе?`
            : `"${name}" пайдаланушысынан admin рөлін алу керек пе?`;
        if (!confirm(msg)) return;
        try {
            await db.collection('users').doc(uid).update({ role: newRole });
            showToast(newRole === 'admin' ? `${name} admin болды` : `${name} user болды`, 'success');
            await loadUsers();
        } catch (err) {
            console.error(err);
            showToast('Қате орын алды', 'error');
        }
    }
</script>
</body>
</html>
