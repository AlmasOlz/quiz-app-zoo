<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; }
        /* Hero */
        .hero-section {
            background: var(--quiz-gradient);
            padding: 52px 0 80px;
            position: relative;
            overflow: hidden;
        }
        .hero-section::before {
            content: '';
            position: absolute; top: -30%; right: -8%;
            width: 520px; height: 520px;
            background: rgba(255,255,255,.07); border-radius: 50%;
        }
        .hero-section::after {
            content: '';
            position: absolute; bottom: -40%; left: -6%;
            width: 360px; height: 360px;
            background: rgba(255,255,255,.05); border-radius: 50%;
        }
        .hero-section .content { position: relative; z-index: 1; }
        .hero-section h1 {
            font-weight: 800; font-size: clamp(2rem, 5vw, 2.6rem);
            color: white; margin-bottom: 10px;
        }
        .hero-section p {
            color: rgba(255,255,255,.78);
            font-size: 15px; margin-bottom: 28px;
        }
        /* Hero stat pills */
        .hero-stats { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .hero-stat {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,.15);
            border: 1px solid rgba(255,255,255,.22);
            color: white; font-size: 13px; font-weight: 600;
            padding: 8px 16px; border-radius: 50px;
            backdrop-filter: blur(6px);
        }
        .hero-stat i { font-size: 14px; opacity: .85; }
        /* Wave divider */
        .hero-wave {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 44px; overflow: hidden; line-height: 0;
        }
        .hero-wave svg { display: block; width: 100%; height: 44px; }
        /* Navbar */
        .main-navbar {
            background: var(--quiz-gradient) !important;
            box-shadow: 0 2px 16px rgba(0,0,0,.15);
        }
        /* User badge */
        .user-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,.15);
            border: 1px solid rgba(255,255,255,.25);
            border-radius: 50px;
            padding: 4px 14px 4px 4px;
            backdrop-filter: blur(6px);
        }
        /* Section title */
        .section-title {
            font-size: 14px; font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: #64748b;
            margin-bottom: 0;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</head>
<body>
<div id="toast-container"></div>

<!-- NAVBAR -->
<nav class="navbar main-navbar navbar-expand-lg sticky-top">
    <div class="container-xl">
        <a class="navbar-brand text-white fw-800 fs-5 d-flex align-items-center gap-2" href="#" style="font-weight:800">
            <div style="width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.25)">
                <i class="fas fa-tasks text-white" style="font-size:15px"></i>
            </div>
            Quiz Platform
        </a>
        <div class="d-flex align-items-center gap-2 ms-auto">
            <a id="admin-link" href="admin/index.html" style="display:none"
               class="btn btn-sm btn-warning fw-semibold">
                <i class="fas fa-cog me-1"></i>Админ
            </a>
            <div class="user-badge">
                <div class="avatar-circle" style="width:30px;height:30px;font-size:12px" id="user-avatar">?</div>
                <span class="text-white fw-semibold small d-none d-sm-inline" id="user-name"></span>
            </div>
            <button class="btn btn-sm fw-semibold text-white"
                    style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px"
                    onclick="logoutUser()">
                <i class="fas fa-sign-out-alt me-1"></i>Шығу
            </button>
        </div>
    </div>
</nav>

<!-- HERO -->
<div class="hero-section">
    <div class="hero-wave">
        <svg viewBox="0 0 1200 44" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,22 C200,44 400,0 600,22 C800,44 1000,0 1200,22 L1200,44 L0,44 Z" fill="#f1f5f9"/>
        </svg>
    </div>
    <div class="container text-center content">
        <p class="text-white fw-semibold mb-1" style="font-size:13px;letter-spacing:.08em;opacity:.7;text-transform:uppercase">
            <i class="fas fa-graduation-cap me-1"></i>Білім платформасы
        </p>
        <h1>Тест таңдаңыз</h1>
        <p>Білімді тексер, нәтижені бақыла және үздіктер арасына кір</p>
        <div class="hero-stats justify-content-center">
            <div class="hero-stat">
                <i class="fas fa-bolt"></i> Жылдам тексеру
            </div>
            <div class="hero-stat">
                <i class="fas fa-chart-line"></i> Прогресс бақылау
            </div>
            <div class="hero-stat">
                <i class="fas fa-trophy"></i> Лидерборд
            </div>
        </div>
    </div>
</div>

<!-- QUIZ GRID -->
<div class="container-xl" style="margin-top:-12px; padding-bottom:48px">

    <!-- Title row -->
    <div class="d-flex align-items-center justify-content-between mb-4 mt-4">
        <p class="section-title"><i class="fas fa-clipboard-list me-2 text-primary opacity-75"></i>Қолжетімді тесттер</p>
        <span class="badge bg-light text-secondary border fw-semibold" id="quiz-count" style="display:none"></span>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4" id="quiz-grid">
        <!-- Skeleton placeholders -->
        <div class="col"><div class="card border-0 shadow-sm h-100" style="border-radius:16px">
            <div class="card-body text-center p-4">
                <div class="skeleton rounded-circle mx-auto mb-3" style="width:72px;height:72px"></div>
                <div class="skeleton mb-2" style="height:14px;border-radius:8px"></div>
                <div class="skeleton mb-3 mx-auto" style="height:11px;width:60%;border-radius:8px"></div>
                <div class="skeleton" style="height:36px;border-radius:50px"></div>
            </div>
        </div></div>
        <div class="col"><div class="card border-0 shadow-sm h-100" style="border-radius:16px">
            <div class="card-body text-center p-4">
                <div class="skeleton rounded-circle mx-auto mb-3" style="width:72px;height:72px"></div>
                <div class="skeleton mb-2" style="height:14px;border-radius:8px"></div>
                <div class="skeleton mb-3 mx-auto" style="height:11px;width:60%;border-radius:8px"></div>
                <div class="skeleton" style="height:36px;border-radius:50px"></div>
            </div>
        </div></div>
        <div class="col"><div class="card border-0 shadow-sm h-100" style="border-radius:16px">
            <div class="card-body text-center p-4">
                <div class="skeleton rounded-circle mx-auto mb-3" style="width:72px;height:72px"></div>
                <div class="skeleton mb-2" style="height:14px;border-radius:8px"></div>
                <div class="skeleton mb-3 mx-auto" style="height:11px;width:60%;border-radius:8px"></div>
                <div class="skeleton" style="height:36px;border-radius:50px"></div>
            </div>
        </div></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const ICON_COLORS = [
        'linear-gradient(135deg,#667eea,#764ba2)',
        'linear-gradient(135deg,#f093fb,#f5576c)',
        'linear-gradient(135deg,#4facfe,#00f2fe)',
        'linear-gradient(135deg,#43e97b,#38f9d7)',
        'linear-gradient(135deg,#fdcb6e,#e17055)',
        'linear-gradient(135deg,#a18cd1,#fbc2eb)',
        'linear-gradient(135deg,#fd79a8,#e84393)',
        'linear-gradient(135deg,#00b894,#00cec9)',
    ];

    requireAuth(async (user, userData) => {
        const name = userData.name || user.email;
        document.getElementById('user-name').textContent = name;
        document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
        if (userData.role === 'admin') document.getElementById('admin-link').style.display = '';
        loadQuizzes(user.uid);
    });

    async function loadQuizzes(userId) {
        const grid = document.getElementById('quiz-grid');
        try {
            const [quizSnap, resultSnap, groupSnap] = await Promise.all([
                db.collection('quizzes').orderBy('createdAt', 'asc').get(),
                db.collection('results').where('userId', '==', userId).get(),
                db.collection('groups').where('members', 'array-contains', userId).get()
            ]);

            if (quizSnap.empty) {
                grid.innerHTML = emptyState('Тесттер әлі жоқ', 'Администратор тесттер қосқанда мұнда пайда болады');
                return;
            }

            // Build best-score map
            const best = {};
            resultSnap.forEach(d => {
                const r = d.data();
                if (!best[r.quizId] || r.percentage > best[r.quizId]) best[r.quizId] = r.percentage;
            });

            // Build group access map: quizId → group name
            // (groupSnap already filtered to this user's groups via array-contains)
            const groupQuizMap = {};
            groupSnap.docs.forEach(d => {
                const g = d.data();
                (g.assignedQuizzes || []).forEach(qid => {
                    if (!groupQuizMap[qid]) groupQuizMap[qid] = g.name;
                });
            });

            const activeDocs = quizSnap.docs.filter(doc => {
                const q = doc.data();
                if (q.isActive === false) return false;
                if (groupQuizMap[doc.id]) return true;
                if (q.accessType === 'restricted') {
                    return Array.isArray(q.allowedUsers) && q.allowedUsers.includes(userId);
                }
                return true;
            });

            if (activeDocs.length === 0) {
                grid.innerHTML = emptyState('Тесттер жоқ', 'Сізге арналған тест тағайындалмаған');
                return;
            }

            // Show count badge
            const countBadge = document.getElementById('quiz-count');
            countBadge.textContent = `${activeDocs.length} тест`;
            countBadge.style.display = '';

            grid.innerHTML = activeDocs.map((doc, i) => {
                const q = doc.data();
                const color = q.color || ICON_COLORS[i % ICON_COLORS.length];
                const icon  = q.icon  || 'fas fa-clipboard-list';
                const b     = best[doc.id];

                const bestBadge = b !== undefined
                    ? `<span class="badge bg-warning text-dark"><i class="fas fa-star me-1"></i>${b}%</span>`
                    : '';
                const timeBadge = q.timeLimit > 0
                    ? `<span class="badge bg-light text-primary border"><i class="fas fa-clock me-1"></i>${q.timeLimit} мин</span>`
                    : `<span class="badge bg-light text-secondary border"><i class="fas fa-infinity me-1"></i>Мерзімсіз</span>`;
                const groupName  = groupQuizMap[doc.id];
                const groupBadge = groupName
                    ? `<span class="badge bg-info-subtle text-info-emphasis border border-info-subtle"><i class="fas fa-layer-group me-1"></i>${groupName}</span>`
                    : '';

                // Completion state
                const doneBadge = b !== undefined
                    ? `<div style="position:absolute;top:12px;right:12px">
                        <span class="badge rounded-pill" style="background:rgba(16,185,129,.15);color:#065f46;border:1px solid rgba(16,185,129,.25);font-size:10px;padding:3px 8px">
                            <i class="fas fa-check me-1"></i>Тапсырылды
                        </span>
                       </div>`
                    : '';

                return `<div class="col animate-in" style="animation-delay:${i * .07}s">
                    <div class="card border-0 shadow-sm h-100 quiz-card-hover" style="border-radius:16px;position:relative">
                        ${doneBadge}
                        <div class="card-body d-flex flex-column align-items-center text-center p-4">
                            <div class="rounded-circle d-flex align-items-center justify-content-center mb-3"
                                 style="width:72px;height:72px;background:${color};box-shadow:0 8px 20px rgba(0,0,0,.15);flex-shrink:0">
                                <i class="${icon} fa-2x text-white"></i>
                            </div>
                            <h6 class="fw-bold mb-1 lh-sm">${q.title}</h6>
                            <p class="text-muted small mb-3" style="min-height:1.2em;font-size:12px">${q.description || '&nbsp;'}</p>
                            <div class="d-flex gap-1 flex-wrap justify-content-center mb-3">
                                <span class="badge bg-light text-secondary border" style="font-size:11px">
                                    <i class="fas fa-question-circle me-1"></i>${q.questionCount || 0} сұрақ
                                </span>
                                ${timeBadge}
                                ${bestBadge}
                                ${groupBadge}
                            </div>
                            <a href="quiz.html?id=${doc.id}" class="btn btn-primary w-100 rounded-pill fw-semibold mt-auto" style="font-size:14px">
                                ${b !== undefined ? '<i class="fas fa-redo me-1"></i>Қайталау' : 'Бастау <i class="fas fa-play ms-1"></i>'}
                            </a>
                        </div>
                    </div>
                </div>`;
            }).join('');
        } catch (err) {
            console.error(err);
            grid.innerHTML = `<div class="col-12 text-center py-5 text-danger">
                <div style="width:64px;height:64px;background:#fef2f2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
                    <i class="fas fa-exclamation-triangle text-danger fa-lg"></i>
                </div>
                <p class="fw-semibold mb-0">Деректерді жүктеу қатесі</p>
                <p class="text-muted small">Беттi жаңартып көріңіз</p>
            </div>`;
        }
    }

    function emptyState(title, sub) {
        return `<div class="col-12 text-center py-5 text-muted">
            <div style="width:80px;height:80px;background:#e2e8f0;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
                <i class="fas fa-inbox fa-2x text-muted opacity-50"></i>
            </div>
            <h6 class="fw-semibold">${title}</h6>
            <p class="small mb-0">${sub}</p>
        </div>`;
    }
</script>
</body>
</html>
